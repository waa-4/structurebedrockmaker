<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bedrock Structure Spawner Pack Builder</title>
  <style>
    :root { color-scheme: dark; }
    body { font-family: system-ui, Arial, sans-serif; max-width: 980px; margin: 24px auto; padding: 0 16px; }
    h1 { margin: 0 0 6px; }
    small { color: #a8a8a8; }
    .card { background: #111; border: 1px solid #222; border-radius: 16px; padding: 14px; margin-top: 14px; }
    .drop {
      border: 2px dashed #555; border-radius: 16px; padding: 22px; text-align: center;
      background: #0c0c0c;
    }
    .drop.drag { border-color: #86f; box-shadow: 0 0 0 3px rgba(136,102,255,.2) inset; }
    .row { display: grid; grid-template-columns: repeat(12, 1fr); gap: 10px; align-items: end; }
    .col-12 { grid-column: span 12; }
    .col-6 { grid-column: span 6; }
    .col-4 { grid-column: span 4; }
    .col-3 { grid-column: span 3; }
    label { display:block; font-size: 13px; color: #cfcfcf; margin: 8px 0 4px; }
    input, select {
      width: 100%; padding: 10px; border-radius: 12px; border: 1px solid #333; background: #0b0b0b; color: #eee;
      outline: none;
    }
    button {
      padding: 11px 14px; border-radius: 14px; border: 1px solid #333; background: #141414; color: #eee;
      cursor: pointer;
    }
    button:hover { background: #1a1a1a; }
    .pill { display:inline-block; padding: 4px 10px; border-radius: 999px; border: 1px solid #333; color:#cfcfcf; font-size: 12px; }
    .list { display: grid; gap: 12px; margin-top: 12px; }
    details { border: 1px solid #222; border-radius: 16px; padding: 12px; background: #0c0c0c; }
    summary { cursor: pointer; font-weight: 600; }
    .danger { color: #ff8a8a; }
    .ok { color: #7dffb2; }
    .actions { display:flex; gap: 10px; flex-wrap: wrap; }
    .spacer { height: 6px; }
    @media (max-width: 820px) {
      .col-6, .col-4, .col-3 { grid-column: span 12; }
    }
  </style>
</head>
<body>
  <h1>Bedrock Structure Spawner Pack Builder</h1>
  <small>Drop <code>.mcstructure</code> files → edit spawn rules → download a Behavior Pack (.mcpack or .zip).</small>

  <div class="card">
    <div class="drop" id="drop">
      <div style="font-size: 16px; margin-bottom: 6px;"><b>Drag & drop</b> your <code>.mcstructure</code> files here</div>
      <small>or pick files:</small>
      <div class="spacer"></div>
      <input id="fileInput" type="file" multiple accept=".mcstructure" />
    </div>
    <div id="status" style="margin-top:10px;"></div>
  </div>

  <div class="card">
    <h2 style="margin: 0 0 10px;">Pack Settings</h2>
    <div class="row">
      <div class="col-6">
        <label>Pack Name</label>
        <input id="packName" value="My Structure Spawner Pack" />
      </div>
      <div class="col-3">
        <label>Namespace (IDs)</label>
        <input id="namespace" value="custom" />
      </div>
      <div class="col-3">
        <label>Download As</label>
        <select id="downloadAs">
          <option value="mcpack" selected>.mcpack (double-click to import)</option>
          <option value="zip">.zip (manual install)</option>
        </select>
      </div>

      <div class="col-4">
        <label>Preset Frequency</label>
        <select id="freqPreset">
          <option value="common">Common</option>
          <option value="uncommon" selected>Uncommon</option>
          <option value="rare">Rare</option>
          <option value="very_rare">Very Rare</option>
        </select>
      </div>

      <div class="col-4">
        <label>Default Biome Filter</label>
        <select id="defaultBiome">
          <option value="overworld" selected>Overworld (any)</option>
          <option value="plains">Plains</option>
          <option value="desert">Desert</option>
          <option value="forest">Forest</option>
          <option value="taiga">Taiga</option>
          <option value="snowy_plains">Snowy Plains</option>
        </select>
      </div>

      <div class="col-4">
        <label>Placement Height</label>
        <select id="defaultHeight">
          <option value="surface" selected>Surface (heightmap)</option>
          <option value="fixed64">Fixed Y=64</option>
          <option value="fixed80">Fixed Y=80</option>
        </select>
      </div>

      <div class="col-12 actions" style="margin-top: 10px;">
        <button id="applyDefaultsBtn">Apply defaults to all structures</button>
        <button id="clearBtn" class="danger">Clear list</button>
        <button id="buildBtn">Build & Download</button>
      </div>
    </div>
  </div>

  <div class="card">
    <h2 style="margin: 0 0 8px;">Structures</h2>
    <div id="emptyHint" class="pill">No structures yet — drop .mcstructure files above.</div>
    <div class="list" id="structuresList"></div>
  </div>

  <!-- JSZip CDN -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
